<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Mapping Example</title>
</head>
<body>

    <h2>Image Mapping Example</h2>

    <img src="/rickandmorty.png" alt="Sample Image" usemap="#map1">

    <map name="map1">
        <!-- Rectangle area -->
        <area shape="rect" coords="50,50,150,150" href="page1.html" alt="Rectangle Area">

        <!-- Circle area -->
        <area shape="circle" coords="250,150,50" href="page2.html" alt="Circle Area">

        <!-- Polygon area -->
        <area shape="poly" coords="300,50,350,100,320,150" href="page3.html" alt="Polygon Area">
    </map>

</body>
</html>
